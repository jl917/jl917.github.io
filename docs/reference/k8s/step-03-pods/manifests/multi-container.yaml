# 멀티 컨테이너 파드 (사이드카 패턴) + initContainer + 공유 볼륨
#   - initContainer 가 먼저 실행돼 index.html 을 만들고 종료
#   - web(nginx) 과 sidecar(busybox) 가 같은 emptyDir 볼륨을 공유
apiVersion: v1
kind: Pod
metadata:
  name: multi
  namespace: step03
spec:
  volumes:
    - name: shared
      emptyDir: {}                # 파드 수명 동안만 존재하는 임시 볼륨 (Step 10)
  initContainers:
    - name: init-content          # 앱 컨테이너보다 먼저, 순서대로 실행되고 끝나야 함
      image: busybox:1.36
      command: ['sh', '-c', 'echo "<h1>Hello from init</h1>" > /work/index.html']
      volumeMounts:
        - name: shared
          mountPath: /work
  containers:
    - name: web                   # 컨테이너 1: nginx 가 공유 볼륨을 웹 루트로 사용
      image: nginx:1.27-alpine
      volumeMounts:
        - name: shared
          mountPath: /usr/share/nginx/html
    - name: sidecar               # 컨테이너 2: 5초마다 로그를 찍는 보조 프로세스
      image: busybox:1.36
      command: ['sh', '-c', 'while true; do echo "tick $(date +%T)"; sleep 5; done']
