# manifests/23-ingress-default-backend.yaml
# 기본 백엔드(default backend).
# 규칙(rules) 없이 defaultBackend 만 가진 Ingress 는 ingress-nginx 에서
# "글로벌 catch-all" 이 됩니다. 즉, 다른 어떤 Ingress 규칙(host/path)에도
# 걸리지 않는 모든 요청을 이 백엔드(hello)가 받아, 기본 404 대신 hello 를 돌려줍니다.
#
# 실측(step14 에서 검증):
#   - 이 Ingress 적용 전:  Host: nope.example.com  →  nginx 기본 404
#   - 이 Ingress 적용 후:  Host: nope.example.com  →  hello (HTTP 200)
#
# 함정: defaultBackend 를 "규칙이 있는 Ingress" 안에 같이 넣어도, 그 host 의
#       매치 안 되는 경로를 per-path 폴백해 주지는 "않습니다"(그건 404). 글로벌
#       catch-all 로 쓰려면 이렇게 rules 없이 defaultBackend 만 두세요.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fallback
  namespace: step14
spec:
  ingressClassName: nginx
  defaultBackend:
    service:
      name: hello
      port:
        number: 80
