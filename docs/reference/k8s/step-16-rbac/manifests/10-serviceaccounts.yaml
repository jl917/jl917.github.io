# manifests/10-serviceaccounts.yaml
# 두 개의 신원(ServiceAccount).
#   pod-reader : pod 만 볼 수 있게 최소 권한을 줄 대상
#   no-access  : 아무 권한도 안 주는 대상(대조군)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-reader
  namespace: step16
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: no-access
  namespace: step16
