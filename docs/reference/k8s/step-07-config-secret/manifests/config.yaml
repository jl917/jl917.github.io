# manifests/config.yaml
# Namespace + ConfigMap + Secret.
apiVersion: v1
kind: Namespace
metadata:
  name: step07
---
# ConfigMap: 민감하지 않은 설정을 키-값으로 보관
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: step07
data:
  # 단순 키-값 (env / envFrom 으로 주입하기 좋음)
  APP_COLOR: "blue"
  APP_MODE: "production"
  GREETING: "hello from configmap"
  # 파일 통째로 (볼륨 마운트하기 좋음)
  app.properties: |
    color=blue
    mode=production
    retries=3
---
# Secret: 민감 정보. data 는 base64 로 "인코딩"될 뿐 "암호화"가 아님(6-4 참조).
# stringData 로 평문을 넣으면 Kubernetes 가 알아서 base64 로 저장합니다.
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: step07
type: Opaque
stringData:
  DB_USER: "admin"
  DB_PASSWORD: "S3cr3t-p@ss"
