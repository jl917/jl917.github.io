# manifests/pods.yaml
# 레이블/셀렉터 실습용 파드 4개.
# app, tier, env 세 축의 레이블을 서로 다르게 조합해 두었습니다.
apiVersion: v1
kind: Pod
metadata:
  name: web-prod-1
  namespace: step04
  labels:
    app: web
    tier: frontend
    env: prod
  annotations:
    # 어노테이션: 셀렉터로 선택할 수 없는, 사람/도구가 읽는 메타데이터
    owner: "julong@musinsa.com"
    description: "프로덕션 프론트엔드 1번"
spec:
  containers:
    - name: nginx
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: web-prod-2
  namespace: step04
  labels:
    app: web
    tier: frontend
    env: prod
spec:
  containers:
    - name: nginx
      image: nginx:1.27-alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: web-dev-1
  namespace: step04
  labels:
    app: web
    tier: frontend
    env: dev
spec:
  containers:
    - name: nginx
      image: nginx:1.27-alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: api-prod-1
  namespace: step04
  labels:
    app: api
    tier: backend
    env: prod
spec:
  containers:
    - name: echo
      image: hashicorp/http-echo:1.0
      args:
        - "-text=hello from api"
        - "-listen=:5678"
      ports:
        - containerPort: 5678
