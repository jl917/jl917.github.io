# 증상 3a: Pending — 스케줄 불가 (터무니없는 CPU 요청)
# 어떤 노드에도 1000 코어는 없다. 실제 자원을 쓰지 않고 Pending 에 머문다.
apiVersion: v1
kind: Pod
metadata:
  name: too-big
  namespace: step24
  labels:
    demo: pending-unschedulable
spec:
  containers:
    - name: web
      image: nginx:1.27-alpine
      resources:
        requests:
          cpu: "1000"        # 1000 코어 요청 → 스케줄 불가
