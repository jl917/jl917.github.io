# 증상 5: Service 로 접속 안 됨 — 셀렉터 불일치로 Endpoints 가 비어있음
# 파드 레이블은 app=echo 인데, Service 셀렉터는 app=web 을 가리킨다 → 매칭 0개.
apiVersion: v1
kind: Pod
metadata:
  name: echo-server
  namespace: step24
  labels:
    app: echo          # 실제 파드 레이블
spec:
  containers:
    - name: echo
      image: hashicorp/http-echo:1.0
      args: ["-text=hello from echo", "-listen=:8080"]
      ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo-svc
  namespace: step24
spec:
  selector:
    app: web           # 오타/불일치 → 어떤 파드도 안 잡힘
  ports:
    - port: 80
      targetPort: 8080
