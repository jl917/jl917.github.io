apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  namespace: step12
spec:
  selector:
    matchLabels:
      app: node-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: node-agent
    spec:
      # 컨트롤플레인 taint를 견디는(tolerate) 설정 → 마스터 노드에도 배치됨
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: agent
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
