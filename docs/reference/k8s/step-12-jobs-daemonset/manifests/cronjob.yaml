apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cron
  namespace: step12
spec:
  schedule: "*/1 * * * *"        # 매 1분마다 실행
  concurrencyPolicy: Forbid      # 이전 Job이 아직 돌면 새 Job을 건너뜀
  successfulJobsHistoryLimit: 3   # 성공한 Job 이력 3개까지 보관
  failedJobsHistoryLimit: 1       # 실패한 Job 이력 1개까지 보관
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: tick
              image: busybox:1.36
              command: ["sh", "-c", "echo tick at $(date); sleep 2"]
