apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  namespace: step12
spec:
  selector:
    matchLabels:
      app: node-agent
  updateStrategy:
    type: RollingUpdate       # 노드마다 순차 교체 (기본값)
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: node-agent
    spec:
      containers:
        - name: agent
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
