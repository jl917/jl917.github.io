# 시크릿 관리 원칙 데모용. 실제 운영에서는 이 YAML 을 git 에 커밋하면 안 된다
# (base64 는 암호화가 아니라 인코딩일 뿐이다). 원칙은 README 8장 참고.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: step20
type: Opaque
stringData:                 # stringData: 평문으로 적으면 API 서버가 base64 로 저장
  DB_PASSWORD: "s3cr3t-do-not-commit"
---
apiVersion: v1
kind: Pod
metadata:
  name: secret-consumer
  namespace: step20
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c", "echo secret len=${#DB_PASSWORD}; sleep 3600"]
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
