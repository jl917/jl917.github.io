# 두 번째 파드: writer 를 삭제한 뒤, 같은 PVC 를 마운트한다.
# emptyDir 과 달리 데이터가 그대로 살아있다는 것을 확인하기 위한 파드.
apiVersion: v1
kind: Pod
metadata:
  name: pvc-reader
  namespace: step10
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: data-pvc      # writer 와 동일한 PVC
