# 첫 번째 파드: PVC 를 마운트하고 파일을 기록한 뒤 살아있는다.
# 이 파드가 뜨는 순간 WaitForFirstConsumer PVC 가 Bound 로 바뀌고 PV 가 자동 생성된다.
apiVersion: v1
kind: Pod
metadata:
  name: pvc-writer
  namespace: step10
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: data-pvc
