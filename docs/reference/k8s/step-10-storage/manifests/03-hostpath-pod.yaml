# ⚠️ hostPath: 노드의 실제 파일시스템을 파드에 그대로 노출한다.
# 매우 위험하므로 학습/특수 목적(노드 로그 수집 등) 외에는 쓰지 않는다.
# 여기서는 안전한 임시 경로(/tmp/k8s-hostpath-demo)만 사용한다. 민감 경로 금지!
apiVersion: v1
kind: Pod
metadata:
  name: hostpath-demo
  namespace: step10
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: host-vol
          mountPath: /host-data
  volumes:
    - name: host-vol
      hostPath:
        path: /tmp/k8s-hostpath-demo   # 노드(=kind 컨테이너) 안의 경로. 절대 /etc, /var 등 금지
        type: DirectoryOrCreate        # 없으면 생성
