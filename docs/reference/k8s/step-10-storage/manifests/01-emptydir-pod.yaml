# emptyDir: 파드 수명과 함께 생겼다 사라지는 임시 볼륨
apiVersion: v1
kind: Pod
metadata:
  name: emptydir-demo
  namespace: step10
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: scratch
          mountPath: /data     # 컨테이너 안에서 /data 에 볼륨을 붙인다
  volumes:
    - name: scratch
      emptyDir: {}             # 노드의 임시 공간에 빈 디렉터리를 만든다
