# manifests/services.yaml
# 같은 백엔드(app=hello)를 4가지 서비스 타입으로 노출합니다.
# ---------------------------------------------------------------
# 1) ClusterIP — 클러스터 내부 전용 가상 IP (기본 타입)
apiVersion: v1
kind: Service
metadata:
  name: hello-clusterip
  namespace: step06
spec:
  type: ClusterIP
  selector:
    app: hello          # 이 레이블을 가진 파드로 트래픽 분산
  ports:
    - name: http
      port: 80          # 서비스 포트
      targetPort: 8080  # 파드(컨테이너) 포트
---
# 2) NodePort — 모든 노드의 고정 포트로 외부 노출
#    kind 클러스터가 30080 을 호스트로 매핑 → http://localhost:30080
apiVersion: v1
kind: Service
metadata:
  name: hello-nodeport
  namespace: step06
spec:
  type: NodePort
  selector:
    app: hello
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080   # 30000~32767 범위. 클러스터에서 이 값 노출됨
---
# 3) LoadBalancer — 클라우드 LB 요청 (kind 에는 LB 프로바이더가 없어 pending)
apiVersion: v1
kind: Service
metadata:
  name: hello-lb
  namespace: step06
spec:
  type: LoadBalancer
  selector:
    app: hello
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# 4) Headless — clusterIP: None. 가상 IP 없이 DNS 가 파드 IP 를 직접 반환
apiVersion: v1
kind: Service
metadata:
  name: hello-headless
  namespace: step06
spec:
  clusterIP: None       # <-- 이게 headless 로 만듦
  selector:
    app: hello
  ports:
    - name: http
      port: 80
      targetPort: 8080
