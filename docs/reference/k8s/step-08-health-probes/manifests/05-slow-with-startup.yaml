apiVersion: v1
kind: Pod
metadata:
  name: slow-with-startup
  namespace: step08
  labels:
    app: slow-with-startup
spec:
  containers:
    - name: web
      image: nginx:1.27-alpine
      # 위와 완전히 동일한 "느린 앱"
      command: ["sh", "-c", "sleep 20 && nginx -g 'daemon off;'"]
      ports:
        - containerPort: 80
      # startupProbe가 기동을 보호: 성공할 때까지 liveness/readiness를 유예
      startupProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 3
        failureThreshold: 10   # 3s*10 = 최대 30초까지 기동 대기 -> 20초 앱을 버텨줌
      # liveness 설정은 위 pod와 완전히 동일 (공격적)
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 3
        failureThreshold: 3
