apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-demo
  namespace: step08
  labels:
    app: readiness-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: readiness-demo
  template:
    metadata:
      labels:
        app: readiness-demo
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          # /tmp/ready 파일이 있어야만 Ready. 처음엔 파일이 없으므로 NotReady -> Endpoints에서 제외
          readinessProbe:
            exec:
              command: ["cat", "/tmp/ready"]
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 1
            successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: readiness-demo
  namespace: step08
spec:
  selector:
    app: readiness-demo
  ports:
    - port: 80
      targetPort: 80
