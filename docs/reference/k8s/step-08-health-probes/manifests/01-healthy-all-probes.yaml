apiVersion: v1
kind: Pod
metadata:
  name: healthy-all-probes
  namespace: step08
  labels:
    app: healthy-all-probes
spec:
  containers:
    - name: web
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
      # startupProbe: 컨테이너가 처음 뜰 때까지만 검사. 성공하면 이후로는 실행 안 함
      startupProbe:
        exec:
          command: ["cat", "/etc/nginx/nginx.conf"]
        periodSeconds: 3
        failureThreshold: 10   # 3s * 10 = 최대 30초까지 기동 대기 허용
      # readinessProbe: 트래픽을 받을 준비가 됐는지 검사 (실패 시 Endpoints에서 제외)
      readinessProbe:
        tcpSocket:
          port: 80
        initialDelaySeconds: 2
        periodSeconds: 5
      # livenessProbe: 살아있는지 검사 (실패 시 컨테이너 재시작)
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 1
        failureThreshold: 3
