# PDB 실습 대상. 4개 replica 를 두 워커에 퍼뜨린다(topologySpreadConstraints).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: step21
  labels:
    app: web
spec:
  replicas: 4
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      terminationGracePeriodSeconds: 10   # 종료 시 최대 10초 유예(기본 30)
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: web
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 5
