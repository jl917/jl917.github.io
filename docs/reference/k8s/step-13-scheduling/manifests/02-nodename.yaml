apiVersion: v1
kind: Pod
metadata:
  name: direct-assign
  namespace: step13
spec:
  # nodeName을 직접 지정하면 스케줄러를 건너뛰고 kubelet이 곧바로 실행한다.
  # 리소스 검사/테인트 검사가 생략되므로 실무에서는 거의 쓰지 않는다.
  nodeName: learn-worker2
  containers:
    - name: app
      image: nginx:1.27-alpine
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
