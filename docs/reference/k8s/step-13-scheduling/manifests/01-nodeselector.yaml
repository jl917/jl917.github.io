apiVersion: v1
kind: Pod
metadata:
  name: pin-worker
  namespace: step13
  labels:
    app: pin-worker
spec:
  # 스케줄러가 이 라벨을 가진 노드에만 배치한다. kind가 노드에 기본 부여하는
  # 내장 라벨(kubernetes.io/hostname)을 사용하므로 노드를 변경할 필요가 없다.
  nodeSelector:
    kubernetes.io/hostname: learn-worker
  containers:
    - name: app
      image: nginx:1.27-alpine
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
