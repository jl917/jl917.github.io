# 멀티 컨테이너 파드: 로그를 만드는 앱(app) + 주기적으로 찍는 사이드카(sidecar).
# logs -c 로 컨테이너를 지정해 읽는 실습에 쓴다.
apiVersion: v1
kind: Pod
metadata:
  name: multi
  namespace: step19
  labels:
    app: multi
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          n=0
          while true; do
            n=$((n+1))
            echo "[app] tick $n at $(date +%T)"
            sleep 2
          done
    - name: sidecar
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
            echo "[sidecar] heartbeat at $(date +%T)"
            sleep 5
          done
